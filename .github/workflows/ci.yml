name: HNG Stage 2 CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. LINT STAGE
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Linting Tools
        run: pip install flake8

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2. TEST STAGE
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fakeredis httpx
          
      - name: Run Tests with Coverage
        run: |
          pytest --cov=api --cov-report=xml
          
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # 3. BUILD & SECURITY SCAN (Combined for reliability)
  build_and_scan:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build Images
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t hng-api:$SHA -t hng-api:latest ./api
          docker build -t hng-worker:$SHA -t hng-worker:latest ./worker
          docker build -t hng-frontend:$SHA -t hng-frontend:latest ./frontend

      - name: Scan API Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan Worker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-worker:latest'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Push to Local Registry (After Scan)
        run: |
          SHA=$(git rev-parse --short HEAD)
          for service in api worker frontend; do
            docker tag hng-$service:latest localhost:5000/hng-$service:$SHA
            docker tag hng-$service:latest localhost:5000/hng-$service:latest
            docker push localhost:5000/hng-$service:$SHA
            docker push localhost:5000/hng-$service:latest
          done

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"
