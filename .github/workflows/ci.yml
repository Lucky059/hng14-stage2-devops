name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install flake8
          npm ci
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Run flake8
        run: flake8 api worker

      - name: Run eslint
        run: npm run lint

      - name: Run hadolint
        run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r api/requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push images to GHCR
        uses: docker/build-push-action@v4
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/api:latest

      - name: Build and push worker
        uses: docker/build-push-action@v4
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/worker:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/frontend:latest

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR for scanner
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Run Trivy scans (containerized)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ runner.temp }}/trivy-cache:/root/.cache/ \
            aquasec/trivy:latest image \
            --severity CRITICAL --exit-code 1 --format sarif -o trivy-api.sarif ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }} || true

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ runner.temp }}/trivy-cache:/root/.cache/ \
            aquasec/trivy:latest image \
            --severity CRITICAL --exit-code 1 --format sarif -o trivy-worker.sarif ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }} || true

          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ runner.temp }}/trivy-cache:/root/.cache/ \
            aquasec/trivy:latest image \
            --severity CRITICAL --exit-code 1 --format sarif -o trivy-frontend.sarif ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }} || true

          # Fail the job if any of the scans returned exit code 1 (CRITICAL found)
          if grep -q '"toolName": "Trivy"' trivy-*.sarif 2>/dev/null; then
            # check for CRITICAL severities in SARIF (simple heuristic)
            if grep -q '"severity": "CRITICAL"' trivy-*.sarif 2>/dev/null; then
              echo "CRITICAL vulnerabilities found; failing job"
              exit 1
            fi
          fi

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan
          path: "*.sarif"

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d
      - name: Run integration test
        run: |
          sleep 10
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed"
              exit 0
            fi
            sleep 2
          done
          echo "Integration test failed"
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        run: echo "Add your deployment steps here"
