name: HNG Stage 2 Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. LINT
  lint:
    name: Linting Stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Python (Flake8)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

      - name: Lint Frontend (ESLint)
        run: |
          cd frontend
          npm install
          # Note: Ensure you have an eslint config file in your frontend folder
          npx eslint . --ext .js,.jsx --fix-dry-run || echo "Eslint finished"

  # 2. TEST
  test:
    name: Testing Stage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Unit Tests with Coverage
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-cov httpx fakeredis
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=./ --cov-report=xml
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: api/coverage.xml

  # 3. BUILD
  build:
    name: Build Stage
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push to Local Registry
        run: |
          # Build API
          docker build -t localhost:5000/hng-api:${{ github.sha }} ./api
          docker tag localhost:5000/hng-api:${{ github.sha }} localhost:5000/hng-api:latest
          docker push localhost:5000/hng-api:latest
          # Build Worker & Frontend (Required by task)
          docker build -t localhost:5000/hng-worker:latest ./worker
          docker push localhost:5000/hng-worker:latest
          docker build -t localhost:5000/hng-frontend:latest ./frontend
          docker push localhost:5000/hng-frontend:latest

  # 4. SECURITY SCAN
  security_scan:
    name: Security Scan Stage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Scan API Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/hng-api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: 1 
      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # 5. INTEGRATION TEST
  integration_test:
    name: Integration Testing Stage
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Stack
        run: |
          docker compose up -d --build
          echo "Waiting for services to be healthy..."
          sleep 30
      - name: Run Lifecycle Integration Test
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh
      - name: Cleanup
        if: always()
        run: docker compose down -v

  # 6. DEPLOY
  deploy:
    name: Deployment Stage
    if: github.ref == 'refs/heads/main'
    needs: integration_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scripted Rolling Update
        run: |
          chmod +x scripts/rolling-update.sh
          ./scripts/rolling-update.sh
