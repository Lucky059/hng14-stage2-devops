
name: HNG Stage 2 Production Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. LINT
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Python and Docker
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Note: hadolint is pre-installed on ubuntu-latest
          find . -name "Dockerfile" | xargs hadolint

  # 2. TEST
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pytest with Coverage
        run: |
          cd api && pip install -r requirements.txt pytest pytest-cov httpx fakeredis
          pytest --cov=./ --cov-report=xml
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # 3. BUILD
  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports: [5000:5000]
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push to Local Registry
        run: |
          docker build -t localhost:5000/hng-api:${{ github.sha }} ./api
          docker tag localhost:5000/hng-api:${{ github.sha }} localhost:5000/hng-api:latest
          docker push localhost:5000/hng-api:latest

  # 4. SECURITY SCAN
  security_scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/hng-api:latest' # Point to local registry
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: 1 # Fail on critical
      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: trivy-results.sarif

  # 5. INTEGRATION TEST
  integration:
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Full Stack Test
        run: |
          docker compose up -d
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh
        env:
          REDIS_PASSWORD: hngpassword

  # 6. DEPLOY (Rolling Update)
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rolling Update
        run: |
          chmod +x scripts/rolling-update.sh
          ./scripts/rolling-update.sh
