name: HNG Stage 2 Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --ignore=E501
          
      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm install
          npx eslint . --ext .js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "*/Dockerfile"
          recursive: true

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run API Unit Tests
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-mock pytest-cov
          pytest --cov=. --cov-report=xml tests/
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and Push to local registry
        run: |
          for service in api worker frontend; do
            TAG=localhost:5000/hng-$service:${{ github.sha }}
            docker build -t $TAG ./$service
            docker push $TAG
          done

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/hng-api:${{ github.sha }}' # Scans one, repeat for others if needed
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1' # Fail on Critical
      - name: Upload Trivy scan results to GitHub Security tab
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Launch Stack
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'testpassword123' }}
        run: docker compose up -d --build
        
      - name: Integration Test Script
        run: |
          # 1. Wait for health
          echo "Waiting for services to be healthy..."
          sleep 30
          
          # 2. Submit job
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "Job ID: $JOB_ID"
          
          # 3. Poll for completion
          ATTEMPTS=0
          while [ $ATTEMPTS -lt 12 ]; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Current Status: $STATUS"
            if [ "$STATUS" == "completed" ]; then
              echo "Integration Test Passed!"
              exit 0
            fi
            sleep 5
            ATTEMPTS=$((ATTEMPTS+1))
          done
          echo "Integration Test Timed Out"
          exit 1
        finally:
          docker compose down

  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rolling Update Script
        run: |
          echo "Simulating Rolling Update..."
          # Deploy new container
          docker compose up -d --no-deps --scale frontend=2 frontend
          
          # Health check check (Wait 60s)
          TIMEOUT=60
          while [ $TIMEOUT -gt 0 ]; do
            if [ $(docker ps --filter "name=frontend" --filter "health=healthy" | wc -l) -ge 2 ]; then
               echo "New frontend passed healthcheck!"
               docker compose up -d --no-deps --scale frontend=1 frontend
               exit 0
            fi
            sleep 5
            TIMEOUT=$((TIMEOUT-5))
          done
          echo "Healthcheck failed. Aborting."
          exit 1
