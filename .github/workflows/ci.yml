name: HNG Stage 2 Final Submission

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Linting Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python Lint
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Testing Stage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-cov httpx fakeredis

      - name: Run Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          pytest --cov=api --cov-report=xml api/tests/

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build and Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load API Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          load: true 
          tags: hng-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: 0 

  integration:
    name: Integration Testing
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Missing Env File
        run: |
          mkdir -p api
          touch api/.env

      - name: Nuclear Port & Docker Cleanup
        # Kills any process on 8000 and prunes the Docker environment
        run: |
          sudo fuser -k 8000/tcp || true
          docker system prune -f
          docker network prune -f

      - name: Start Services
        run: |
          export REDIS_HOST=redis
          export REDIS_PORT=6379
          # --scale api=1 ensures only ONE api container is created
          # -p hng_test provides a clean, unique project namespace
          docker compose -p hng_test up -d --build --force-recreate --scale api=1

      - name: Run Integration Script
        run: |
          # Ensure script is executable
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh

      - name: Cleanup
        if: always()
        run: docker compose -p hng_test down -v

  deploy:
    name: Deployment Stage
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Final Success
        run: echo "Pipeline complete. Ready for submission."
