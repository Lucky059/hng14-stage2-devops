name: CI CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  # fallback image tag prefix if needed; OWNER_LOWER is set in the build job
  IMAGE_NAME_PREFIX: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters and tools
        run: |
          pip install flake8
          npm ci
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Run flake8
        run: flake8 api worker

      - name: Run eslint
        run: npm run lint

      - name: Run hadolint
        run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r api/requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: owner
        run: |
          echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/api:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LOWER }}/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v4
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/worker:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LOWER }}/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LOWER }}/frontend:latest

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR for scanner
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Run Trivy scans and produce SARIF
        run: |
          set -euo pipefail

          # Ensure runner temp cache exists
          mkdir -p "${RUNNER_TEMP:-/tmp}/trivy-cache"

          # scan API
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${RUNNER_TEMP:-/tmp}/trivy-cache":/root/.cache/ \
            aquasec/trivy:latest image \
            --severity CRITICAL --exit-code 1 --format sarif -o trivy-api.sarif ghcr.io/${{ env.OWNER_LOWER }}/api:${{ github.sha }} || true

          # scan Worker
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${RUNNER_TEMP:-/tmp}/trivy-cache":/root/.cache/ \
            aquasec/trivy:latest image \
            --severity CRITICAL --exit-code 1 --format sarif -o trivy-worker.sarif ghcr.io/${{ env.OWNER_LOWER }}/worker:${{ github.sha }} || true

          # scan Frontend
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${RUNNER_TEMP:-/tmp}/trivy-cache":/root/.cache/ \
            aquasec/trivy:latest image \
            --severity CRITICAL --exit-code 1 --format sarif -o trivy-frontend.sarif ghcr.io/${{ env.OWNER_LOWER }}/frontend:${{ github.sha }} || true

          # Fail if any SARIF contains CRITICAL severity
          if grep -q '"severity": "CRITICAL"' trivy-*.sarif 2>/dev/null; then
            echo "CRITICAL vulnerabilities found; failing job"
            exit 1
          fi

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan
          path: "*.sarif"

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR for integration test pulls
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Start stack
        run: |
          # If your docker-compose pulls images from GHCR, ensure compose references ghcr.io/${{ env.OWNER_LOWER }}/...:${{ github.sha }} or :latest
          docker compose up -d

      - name: Run integration test
        run: |
          sleep 10
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed"
              exit 0
            fi
            sleep 2
          done
          echo "Integration test failed"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        run: echo "Add your deployment steps here"
