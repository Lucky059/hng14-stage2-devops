
name: HNG Stage 2 Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # STAGE 1: LINTING
  lint:
    name: 1. Linting Stage
    runs-on: ubuntu-latest
    steps:
      - name: 1.1 Checkout Source Code
        uses: actions/checkout@v4

      - name: 1.2 Lint Python (Flake8)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 1.3 Lint JavaScript (ESLint)
        run: |
          cd frontend
          npm install
          npm run lint

      - name: 1.4 Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008

  # STAGE 2: UNIT TESTING
  test:
    name: 2. Testing Stage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: 2.1 Checkout Source Code
        uses: actions/checkout@v4

      - name: 2.2 Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 2.3 Install Testing Dependencies
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-cov httpx fakeredis pytest-mock

      - name: 2.4 Run Pytest with Mocked Redis
        run: |
          cd api
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=./ --cov-report=xml tests/

      - name: 2.5 Upload Coverage Results
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: api/coverage.xml

  # STAGE 3: DOCKER BUILD & CACHE
  build:
    name: 3. Build Stage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 3.1 Checkout Source Code
        uses: actions/checkout@v4

      - name: 3.2 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 3.3 Build and Tag Images (SHA & Latest)
        run: |
          # Build with dual tagging for traceability
          docker build -t hng-api:latest -t hng-api:${{ github.sha }} ./api
          docker build -t hng-worker:latest -t hng-worker:${{ github.sha }} ./worker
          docker build -t hng-frontend:latest -t hng-frontend:${{ github.sha }} ./frontend
          # Save images for security and integration stages
          docker save hng-api:latest hng-worker:latest hng-frontend:latest > full_stack.tar

      - name: 3.4 Upload Docker Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-stack-images
          path: full_stack.tar

  # STAGE 4: SECURITY ANALYSIS
  security:
    name: 4. Security Scan Stage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 4.1 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: full-stack-images

      - name: 4.2 Load Docker Images
        run: docker load < full_stack.tar

      - name: 4.3 Scan API for Critical Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: 0

      - name: 4.4 Upload SARIF Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # STAGE 5: INTEGRATION TESTING
  integration:
    name: 5. Integration Stage
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: 5.1 Checkout Source Code
        uses: actions/checkout@v4

      - name: 5.2 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: full-stack-images

      - name: 5.3 Spin up Environment via Docker Compose
        run: |
          docker load < full_stack.tar
          docker compose up -d
          sleep 20

      - name: 5.4 Execute Integration Health Script
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh

      - name: 5.5 Final Environment Teardown
        if: always()
        run: docker compose down -v

  # STAGE 6: DEPLOYMENT
  deploy:
    name: 6. Deployment Stage
    if: github.ref == 'refs/heads/main'
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: 6.1 Checkout Source Code
        uses: actions/checkout@v4

      - name: 6.2 Execute Scripted Rolling Update
        run: |
          chmod +x scripts/rolling-update.sh
          ./scripts/rolling-update.sh
