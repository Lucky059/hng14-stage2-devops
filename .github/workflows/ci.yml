name: HNG Stage 2 Final Submission

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Lint
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run Unit Tests
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-cov httpx fakeredis
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/

  integration:
    needs: lint-and-unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Nuclear Port Cleanup
        run: |
          sudo fuser -k 8000/tcp || true
          docker system prune -af
          mkdir -p api && touch api/.env

      - name: Start Services
        run: |
          docker compose -p hng_test up -d --build
          echo "Waiting 20s for Uvicorn to initialize..."
          sleep 20

      - name: Debug Startup
        run: |
          docker ps
          docker logs hng-api-server

      - name: Run Integration Script
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh

      - name: Cleanup
        if: always()
        run: docker compose -p hng_test down -v
