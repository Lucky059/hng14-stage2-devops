name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install flake8
          npm ci
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Run flake8
        run: flake8 api worker

      - name: Run eslint
        run: npm run lint

      - name: Run hadolint
        run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r api/requirements.txt

      - name: Run tests
        run: pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          docker build -t localhost:5000/api:$GIT_SHA -t localhost:5000/api:latest api
          docker build -t localhost:5000/worker:$GIT_SHA -t localhost:5000/worker:latest worker
          docker build -t localhost:5000/frontend:$GIT_SHA -t localhost:5000/frontend:latest frontend
          docker push localhost:5000/api:$GIT_SHA
          docker push localhost:5000/worker:$GIT_SHA
          docker push localhost:5000/frontend:$GIT_SHA

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run
