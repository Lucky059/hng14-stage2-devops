name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          # Ignore E501 (line length) to avoid common failures
          flake8 api/ worker/ --ignore=E501 --count --statistics

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm install
          npx eslint . --ext .js --fix-dry-run

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "*/Dockerfile"
          recursive: true

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run API Unit Tests
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-mock pytest-cov
          pytest --cov=. --cov-report=xml tests/

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Images
        run: |
          for service in api worker frontend; do
            docker build -t hng-$service:${{ github.sha }} ./$service
          done

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          # Scanning the API image as a representative sample
          image-ref: 'hng-api:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1' 

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Launch Stack
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'testpassword123' }}
        run: docker compose up -d --build
              
      - name: Integration Test Script
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30
                    
          # Submit job to the API
          RESPONSE=$(curl -s -X POST http://localhost:8000/jobs)
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          echo "Job ID: $JOB_ID"
                    
          if [ "$JOB_ID" == "null" ]; then exit 1; fi

          # Poll for completion
          ATTEMPTS=0
          while [ $ATTEMPTS -lt 12 ]; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Current Status: $STATUS"
            if [ "$STATUS" == "completed" ]; then
              echo "Integration Test Passed!"
              exit 0
            fi
            sleep 5
            ATTEMPTS=$((ATTEMPTS+1))
          done
          echo "Integration Test Timed Out"
          exit 1

      - name: Cleanup Containers
        if: always()
        run: docker compose down

  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rolling Update Simulation
        run: |
          echo "Executing rolling update..."
          # This simulates a zero-downtime swap
          docker compose up -d --no-deps --scale frontend=2 frontend
          sleep 10
          docker compose up -d --no-deps --scale frontend=1 frontend
          echo "Deployment successful."
