name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Linting and Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

      - name: Lint Frontend JavaScript
        run: |
          cd frontend
          npm install
          npm run lint || true

      - name: Lint Python Code
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Unit Testing and Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Pytest
        run: |
          pip install -r api/requirements.txt pytest pytest-cov httpx
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          pytest --cov=api --cov-report=xml api/tests/
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Container Build and Security Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Tag API Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          tags: |
            hng-api:latest
            hng-api:${{ github.sha }}
          outputs: type=docker,dest=/tmp/api.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: 1

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  integration:
    name: Integration Testing
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Start Multi-Container Stack
        run: |
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" > .env
          docker compose up -d --build
      - name: Execute Integration Script
        run: bash scripts/integration-test.sh
      - name: Cleanup Services
        if: always()
        run: docker compose down
