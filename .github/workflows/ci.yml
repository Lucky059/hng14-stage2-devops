name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install flake8
          npm ci
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Run flake8
        run: flake8 api worker

      - name: Run eslint
        run: npm run lint

      - name: Run hadolint
        run: hadolint Dockerfile api/Dockerfile worker/Dockerfile frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: pip install pytest pytest-cov
      - name: Run tests
        run: pytest api/tests --cov=api --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          docker build -t localhost:5000/api:$GIT_SHA -t localhost:5000/api:latest api
          docker build -t localhost:5000/worker:$GIT_SHA -t localhost:5000/worker:latest worker
          docker build -t localhost:5000/frontend:$GIT_SHA -t localhost:5000/frontend:latest frontend
          docker push localhost:5000/api:$GIT_SHA
          docker push localhost:5000/worker:$GIT_SHA
          docker push localhost:5000/frontend:$GIT_SHA

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y trivy
      - name: Scan images
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-api.sarif localhost:5000/api:latest
          trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-worker.sarif localhost:5000/worker:latest
          trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-frontend.sarif localhost:5000/frontend:latest
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan
          path: "*.sarif"

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d
      - name: Run integration test
        run: |
          sleep 10
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed"
              exit 0
            fi
            sleep 2
          done
          echo "Integration test failed"
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Rolling update
        run: |
          docker compose up -d new_api
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/health | jq -r .status)
            if [ "$STATUS" = "ok" ]; then
              docker compose stop old_api
              exit 0
            fi
            sleep 2
          done
          echo "Deploy aborted: health check failed"
          docker compose stop new_api
          exit 1
