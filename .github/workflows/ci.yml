
name: HNG Stage 2 Final Submission

on:
  push:
    branches: [ main ]

jobs:
  # 1. LINT
  lint:
    name: Linting Stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2. TEST
  test:
    name: Testing Stage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd api && pip install -r requirements.txt pytest httpx fakeredis
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/

  # 3. BUILD
  build:
    name: Build Stage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Save Image
        run: |
          docker build -t hng-api:latest ./api
          docker save hng-api:latest > hng-api.tar
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hng-api-image
          path: hng-api.tar

  # 4. SECURITY SCAN
  security_scan:
    name: Security Scan Stage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: hng-api-image
      - name: Load Docker Image
        run: docker load < hng-api.tar
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:latest'
          format: 'table'
          exit-code: 0 

  # 5. INTEGRATION TEST
  integration_test:
    name: Integration Testing Stage
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: hng-api-image
      - name: Load Docker Image
        run: docker load < hng-api.tar
      - name: Start Services
        run: |
          sudo fuser -k 8000/tcp || true
          docker compose -p hng_test up -d --build
          sleep 20
      - name: Run Script
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh

  # 6. DEPLOY
  deploy:
    name: Deployment Stage
    needs: integration_test
    runs-on: ubuntu-latest
    steps:
      - name: Final Success
        run: echo "Stage 2 Requirements Satisfied."
