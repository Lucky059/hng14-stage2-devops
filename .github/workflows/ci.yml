name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. LINT STAGE
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --ignore=E501 --count --statistics
          
      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "*/Dockerfile"
          recursive: true

  # 2. TEST STAGE
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Run API Unit Tests
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-mock pytest-cov
          # PYTHONPATH=. ensures 'main' is findable by pytest
          PYTHONPATH=. pytest --cov=. --cov-report=xml tests/
          
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml

  # 3. BUILD STAGE
  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          
      - name: Build and Push to Local Registry
        run: |
          for service in api worker frontend; do
            IMAGE="localhost:5000/hng-$service"
            # Tag with SHA and latest
            docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./$service
            docker push $IMAGE:${{ github.sha }}
            docker push $IMAGE:latest
          done

  # 4. SECURITY SCAN STAGE
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy scanner (API Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/hng-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          
      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # 5. INTEGRATION TEST STAGE
  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Launch Stack
        run: docker compose up -d --build
              
      - name: Integration Test Script
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30
          
          # Submit job via API
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "Job ID: $JOB_ID"
          
          # Poll for completion (max 60s)
          ATTEMPTS=0
          while [ $ATTEMPTS -lt 12 ]; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "Current Status: $STATUS"
            if [ "$STATUS" == "completed" ]; then
              echo "Integration Test Passed!"
              exit 0
            fi
            sleep 5
            ATTEMPTS=$((ATTEMPTS+1))
          done
          echo "Integration Test Timed Out"
          exit 1
          
      - name: Teardown
        if: always()
        run: docker compose down

  # 6. DEPLOY STAGE
  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scripted Rolling Update
        run: |
          echo "Starting Rolling Update..."
          # 1. Scale up new containers
          docker compose up -d --no-deps --scale frontend=2 frontend
          
          # 2. Wait for health check (max 60s)
          TIMEOUT=60
          while [ $TIMEOUT -gt 0 ]; do
            # Count healthy containers
            HEALTHY_COUNT=$(docker ps --filter "name=frontend" --filter "health=healthy" | grep -c "healthy" || true)
            if [ "$HEALTHY_COUNT" -ge 2 ]; then
               echo "New instance is healthy. Completing update..."
               docker compose up -d --no-deps --scale frontend=1 frontend
               exit 0
            fi
            sleep 5
            TIMEOUT=$((TIMEOUT-5))
          done
          
          echo "Health check failed. Rolling back..."
          docker compose up -d --no-deps --scale frontend=1 frontend
          exit 1
