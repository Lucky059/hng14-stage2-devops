name: HNG Stage 2 CI/CD Final

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
      - name: Flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: |
          pip install -r api/requirements.txt pytest pytest-cov fakeredis httpx
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          pytest --cov=api --cov-report=xml api/tests/
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build_and_scan:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build and Scan
        run: |
          docker build -t localhost:5000/hng-api:latest ./api
          docker build -t localhost:5000/hng-worker:latest ./worker
          docker build -t localhost:5000/hng-frontend:latest ./frontend
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/hng-api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
      - name: Push
        run: |
          docker push localhost:5000/hng-api:latest
          docker push localhost:5000/hng-worker:latest
          docker push localhost:5000/hng-frontend:latest
      - name: Upload Scan
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: "trivy-results.sarif"

  integration_test:
    needs: build_and_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Env for Test
        run: |
          echo "REDIS_PASSWORD=hngpassword" > api/.env
          echo "REDIS_PASSWORD=hngpassword" > worker/.env
          echo "REDIS_PASSWORD=hngpassword" > frontend/.env
          echo "REDIS_PASSWORD=hngpassword" > .env
      - name: Build and Start Stack
        run: docker compose up -d --build
      - name: Health Check
        run: |
          echo "Waiting for services..."
          sleep 40
          docker compose ps
          curl -f http://localhost:8000/health || exit 1
      - name: Shutdown
        if: always()
        run: docker compose down

  deploy:
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Simulation
        run: echo "Rolling update successful."
