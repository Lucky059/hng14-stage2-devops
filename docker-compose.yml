services:
  api:
    build: ./api
    image: hng-api:latest
    restart: always
    ports:
      - "8000"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hng-network

  worker:
    build: ./worker
    image: hng-worker:latest
    restart: always
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hng-network

  redis:
    image: redis:alpine
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hng-network

  frontend:
    build: ./frontend
    image: hng-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - hng-network

networks:
  hng-network:
    name: hng_production_network
    driver: bridge
