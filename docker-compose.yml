
version: '3.8'

services:
  api:
    build: ./api
    env_file: ./api/.env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  worker:
    build: ./worker
    env_file: ./worker/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-hngpassword}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hngpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

networks:
  app_network:
    name: app_network
    driver: bridge
