
services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-hngpassword}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hngpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  api:
    build: ./api
    image: hng-api:latest
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-hngpassword}
    env_file:
      - ./api/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  frontend:
    build: ./frontend
    image: hng-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - app_network

  worker:
    build: ./worker
    image: hng-worker:latest
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app_network

networks:
  app_network:
    name: hng_network
    driver: bridge
