version: '3.8'

services:
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    image: hng-api:latest
    # Requirement: All config via environment
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-hngpassword}
      - APP_ENV=production
    env_file:
      - ./api/.env
    ports:
      - "8000:8000"
    # Requirement: Depends on healthy
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    # Requirement: Resource limits & Rolling Update logic
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hng-frontend:latest
    environment:
      - API_URL=http://api:8000
    ports:
      - "3000:80" # Nginx usually listens on 80 inside the container
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: hng-worker:latest
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-hngpassword}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    # Requirement: No host ports exposed for Redis (Security)
    command: redis-server --requirepass ${REDIS_PASSWORD:-hngpassword}
    # Requirement: Redis healthcheck
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hngpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

# Requirement: Named Network
networks:
  app_network:
    name: hng_network
    driver: bridge
